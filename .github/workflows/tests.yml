name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, mysql, pgsql]

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: golded_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: golded_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d golded_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: pdo_sqlite, pdo_mysql, pdo_pgsql

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Configure SQLite
        if: matrix.database == 'sqlite'
        run: |
          touch database/database.sqlite
          {
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=database/database.sqlite"
          } >> "$GITHUB_ENV"
          php artisan config:clear

      - name: Configure MySQL
        if: matrix.database == 'mysql'
        run: |
          {
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=golded_test"
            echo "DB_USERNAME=root"
            echo "DB_PASSWORD=password"
          } >> "$GITHUB_ENV"
          php artisan config:clear

      - name: Configure PostgreSQL
        if: matrix.database == 'pgsql'
        run: |
          {
            echo "DB_CONNECTION=pgsql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=5432"
            echo "DB_DATABASE=golded_test"
            echo "DB_USERNAME=postgres"
            echo "DB_PASSWORD=password"
          } >> "$GITHUB_ENV"
          php artisan config:clear

      - name: Build Assets
        run: npm run build

      - name: Pint
        run: composer lint:check

      - name: PHPStan
        run: composer test:types

      - name: Rector
        run: composer test:refactor

      - name: Pest
        run: php artisan test --compact
